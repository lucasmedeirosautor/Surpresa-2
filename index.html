<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>O Início da Jornada</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    body{
      margin: 0;
      font-family: 'Cinzel', serif;
      color: #fff5e1;
      background: linear-gradient(180deg, #3b0a0a, #1a0000);
      text-align: center;
      overflow-y: auto; /* Permite rolagem vertical com dedos/mouse */
      overflow-x: hidden; /* Evita scroll horizontal */
    }

    .container{
      padding: 30px;
      position: relative;
      z-index: 2;
    }

    .title{
      font-family: 'Great Vibes', cursive;
      font-size: 42px;
      color: #ffd700;
      margin-bottom: 10px;
      text-shadow: 0 0 20px rgba(255,215,0,0.8);
    }

    .subtitle{
      font-size: 20px;
      margin-bottom: 25px;
      color: #e6cfa3;
    }

    .text-block{
      font-size: 18px;
      margin: 25px 0;
      min-height: 50px;
      text-shadow: 0 0 10px rgba(255,255,255,0.2);
    }

    .verse{
      font-style: italic;
      font-size: 16px;
      color: #e6cfa3;
    }

    .hint{
      margin-top: 40px;
      font-size: 20px;
      color: #ffd700;
      font-weight: bold;
    }

    .music-btn{
      background: linear-gradient(45deg, #d4af37, #ffd700);
      color: black;
      padding: 12px 25px;
      border-radius: 30px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      margin-bottom: 20px;
      box-shadow: 0 0 15px rgba(255,215,0,0.6);
      transition: 0.3s;
    }

    .music-btn:hover{
      transform: scale(1.05);
    }

    .particles{
      position: fixed;
      width: 100%;
      height: 100%;
      background: url('https://www.transparenttextures.com/patterns/stardust.png');
      animation: moveStars 60s linear infinite;
      z-index: 1;
      opacity: 0.3;
    }

    @keyframes moveStars {
      from {background-position: 0 0;}
      to {background-position: 10000px 5000px;}
    }

    .final-button{
      display: none;
      background: linear-gradient(45deg, #ffda6f, #ffd700);
      color: black;
      padding: 15px 30px;
      border-radius: 50px;
      font-weight: bold;
      text-decoration: none;
      font-size: 20px;
      margin-top: 30px;
      box-shadow: 0 0 25px rgba(255,215,0,0.8);
      transition: 0.3s;
    }
    .final-button:hover{
      transform: scale(1.1);
    }
  </style>
</head>

<body>

<div class="particles"></div>

<!-- Música -->
<audio id="music" loop>
  <source src="Musica.mp3 .mp3" type="audio/mpeg">
</audio>

<div class="container">

  <div class="title">Uma nova jornada...</div>
  <div class="subtitle">Princesa Talita 👑</div>

  <button class="music-btn" onclick="playMusic()">🎵 Iniciar música</button>

  <div class="text-block" data-text="Parabéns, princesa... por ter coragem de descobrir como sua vida está prestes a mudar."></div>

  <div class="text-block" data-text="A partir de agora, você entrou em um pequeno caça ao tesouro... feito especialmente para você."></div>

  <div class="text-block" data-text="Cada pista foi pensada com carinho... e cada passo vai te levar mais perto de algo muito especial."></div>

  <div class="text-block" data-text="Mas atenção... observe bem cada detalhe."></div>

  <div class="text-block verse" data-text="Ó, todos os que tendes sede, vinde às águas; e vós que não tendes dinheiro, vinde, comprai e comei… ( Isaías 55:1) "></div>

  <div class="text-block hint" data-text="Agora vá até o lugar onde compramos."></div>

  <div class="text-block hint" data-text="Procure com atenção... sua próxima pista já está esperando por você. ( obs procure em um envelope amarelo, pode estar aonde usamos pra descansar ) "></div>

</div>

<script>
  const blocks = document.querySelectorAll('.text-block');

  function typeEffect(element, text, speed = 40) {
    return new Promise(resolve => {
      let i = 0;
      function typing() {
        if (i < text.length) {
          element.innerHTML += text.charAt(i);
          i++;
          setTimeout(typing, speed);
        } else {
          resolve();
        }
      }
      typing();
    });
  }

  async function startSequence() {
    for (let block of blocks) {
      const text = block.getAttribute('data-text');
      await typeEffect(block, text);
      await new Promise(r => setTimeout(r, 800));
    }
    // Mostrar botão final após terminar digitação
    document.getElementById('finalBtn').style.display = 'inline-block';
  }

  window.addEventListener('load', startSequence);

  function playMusic(){
    const music = document.getElementById("music");
    music.volume = 0.1;
    music.play().then(() => {
      let volume = 0.1;
      const interval = setInterval(() => {
        if(volume < 1){
          volume += 0.05;
          music.volume = volume;
        } else {
          clearInterval(interval);
        }
      }, 500);
    }).catch(err => console.log("Erro ao tocar música:", err));
  }
</script>

</body>
</html>
