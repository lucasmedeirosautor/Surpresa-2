<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>O Início da Jornada</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    body{
      margin: 0;
      font-family: 'Cinzel', serif;
      color: #fff5e1;
      background: linear-gradient(180deg, #3b0a0a, #1a0000);
      text-align: center;
    }

    .container{
      padding: 30px;
    }

    .title{
      font-family: 'Great Vibes', cursive;
      font-size: 42px;
      color: #ffd700;
      margin-bottom: 10px;
      text-shadow: 0 0 15px rgba(255,215,0,0.6);
    }

    .subtitle{
      font-size: 20px;
      margin-bottom: 25px;
      color: #e6cfa3;
    }

    .text-block{
      font-size: 18px;
      margin: 25px 0;
      min-height: 50px;
    }

    .verse{
      font-style: italic;
      font-size: 16px;
      color: #e6cfa3;
      margin-top: 20px;
    }

    .hint{
      margin-top: 40px;
      font-size: 20px;
      color: #ffd700;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="title">Uma nova jornada...</div>
  <div class="subtitle">Princesa Talita 👑</div>

  <div class="text-block" data-text="Parabéns, princesa... por ter coragem de descobrir como sua vida está prestes a mudar."></div>

  <div class="text-block" data-text="A partir de agora, você entrou em um pequeno caça ao tesouro... feito especialmente para você."></div>

  <div class="text-block" data-text="Cada pista foi pensada com carinho... e cada passo vai te levar mais perto de algo muito especial."></div>

  <div class="text-block" data-text="Mas atenção... observe bem cada detalhe."></div>

  <div class="text-block verse" data-text="&quot;Em paz me deito e logo adormeço, pois só tu, Senhor, me fazes viver em segurança.&quot; (Salmos 4:8)"></div>

  <div class="text-block hint" data-text="Agora vá até o lugar onde seu dia começa... e também termina."></div>

  <div class="text-block hint" data-text="Procure com atenção... sua próxima pista já está esperando por você."></div>

</div>

<script>
  const blocks = document.querySelectorAll('.text-block');

  function typeEffect(element, text, speed = 40) {
    return new Promise(resolve => {
      let i = 0;

      function typing() {
        if (i < text.length) {
          element.innerHTML += text.charAt(i);
          i++;
          setTimeout(typing, speed);
        } else {
          resolve();
        }
      }

      typing();
    });
  }

  async function startSequence() {
    for (let block of blocks) {
      const text = block.getAttribute('data-text');
      await typeEffect(block, text);
      await new Promise(r => setTimeout(r, 800));
    }
  }

  window.addEventListener('load', startSequence);
</script>

</body>
</html>
